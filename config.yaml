# ==============================================================================
# LEAD GEN CONFIG — edit this file to change what gets searched
# 100% FREE data source: OpenStreetMap (Overpass API + Nominatim geocoding)
# No API key, no billing account, no credit card needed anywhere in this project.
# ==============================================================================

countries:
  - USA
  - Australia
  - Canada

cities:
  USA:
    - "New York, NY"
    - "Los Angeles, CA"
    - "Chicago, IL"
    - "Houston, TX"
    - "Phoenix, AZ"
    - "Philadelphia, PA"
    - "San Antonio, TX"
    - "San Diego, CA"
    - "Dallas, TX"
    - "Austin, TX"
    - "Jacksonville, FL"
    - "Columbus, OH"
    - "Charlotte, NC"
    - "Indianapolis, IN"
    - "Seattle, WA"
    - "Denver, CO"
    - "Boston, MA"
    - "Nashville, TN"
    - "Portland, OR"
    - "Las Vegas, NV"
  Australia:
    - "Sydney, NSW"
    - "Melbourne, VIC"
    - "Brisbane, QLD"
    - "Perth, WA"
    - "Adelaide, SA"
    - "Gold Coast, QLD"
    - "Newcastle, NSW"
    - "Canberra, ACT"
  Canada:
    - "Toronto, ON"
    - "Vancouver, BC"
    - "Montreal, QC"
    - "Calgary, AB"
    - "Ottawa, ON"
    - "Edmonton, AB"
    - "Winnipeg, MB"
    - "Quebec City, QC"

# Each category maps to one or more OpenStreetMap tags (key=value pairs).
# Overpass will match ANY of the listed tags for that category (OR logic).
# You can add more categories/tags any time — see https://wiki.openstreetmap.org/wiki/Map_features
categories:
  restaurant:
    - ["amenity", "restaurant"]
    - ["amenity", "cafe"]
  dentist:
    - ["amenity", "dentist"]
  hair_salon:
    - ["shop", "hairdresser"]
  plumber:
    - ["craft", "plumber"]
  lawyer:
    - ["office", "lawyer"]
  real_estate_agency:
    - ["office", "estate_agent"]
  gym:
    - ["leisure", "fitness_centre"]
  auto_repair_shop:
    - ["shop", "car_repair"]
  accounting_firm:
    - ["office", "accountant"]
  chiropractor:
    - ["healthcare", "chiropractor"]
  veterinary_clinic:
    - ["amenity", "veterinary"]
  roofing_contractor:
    - ["craft", "roofer"]
  landscaping_company:
    - ["craft", "gardener"]
  photography_studio:
    - ["shop", "photo"]
  interior_designer:
    - ["craft", "interior_decorator"]
  electrician:
    - ["craft", "electrician"]
  hvac_contractor:
    - ["craft", "hvac"]
  insurance_agency:
    - ["office", "insurance"]
  tattoo_shop:
    - ["shop", "tattoo"]
  physical_therapy_clinic:
    - ["healthcare", "physiotherapist"]

# How many NEW leads to try to collect per run.
daily_lead_target: 200

# Search radius in meters around each city center.
radius_meters: 25000

# A business only becomes a "lead" if its website is missing or fails these checks.
website_quality:
  require_https: true
  require_mobile_viewport: true
  max_acceptable_load_seconds: 4
